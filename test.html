<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duel Platform Test</title>
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: rgb(174, 99, 28);
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: rgb(28, 192, 229);
            text-shadow: 0 0 10px rgb(18, 116, 164);
        }
        .players {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .player-panel {
            background: #2a2a2a;
            border: 2px solid rgb(102, 96, 101);
            padding: 20px;
            border-radius: 10px;
        }
        .player-panel h2 {
            color: rgb(101, 108, 101);
            margin-bottom: 15px;
            border-bottom: 1px solid rgb(242, 248, 242);
            padding-bottom: 10px;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            background: #1a1a1a;
            border-left: 3px solid rgb(195, 202, 195);
        }
        .status.error {
            border-left-color: #f00;
            color: #f00;
        }
        .status.success {
            border-left-color: #0f0;
            color: #0f0;
        }
        .input-group {
            margin: 15px 0;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: rgb(95, 33, 140);
        }
        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid rgb(234, 240, 234);
            color: rgb(68, 68, 68);
            border-radius: 5px;
            font-family: 'Courier New', monospace;
        }
        .input-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        button {
            background: rgb(130, 135, 130);
            color: #1a1a1a;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }
        button:hover {
            background: rgb(79, 80, 79);
            box-shadow: 0 0 10px rgb(249, 250, 249);
        }
        button:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
        }
        .logs {
            background: #000;
            border: 2px solid rgb(208, 213, 208);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        .logs h3 {
            color: rgb(197, 204, 197);
            margin-bottom: 10px;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 2px solid #0f0;
            padding-left: 10px;
        }
        .log-entry.info { color: #0af; }
        .log-entry.success { color: rgb(0, 174, 255); }
        .log-entry.error { color: #f00; }
        .log-entry.warning { color: #ff0; }
        .match-info {
            background: #1a1a1a;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid rgb(65, 30, 242);
            border-radius: 5px;
        }
        .match-info h4 {
            color: rgb(203, 80, 9);
            margin-bottom: 10px;
        }
        .match-info pre {
            color: rgb(255, 102, 0);
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 DUEL PLATFORM TEST</h1>
        
        <div class="players">
            <!-- PLAYER 1 -->
            <div class="player-panel">
                <h2>👤 PLAYER 1</h2>
                
                <div class="input-group">
                    <label>Username:</label>
                    <input type="text" id="p1-username" value="player1">
                </div>
                
                <div class="input-group">
                    <label>Password:</label>
                    <input type="password" id="p1-password" value="12345678">
                </div>
                
                <button onclick="registerPlayer(1)">Register</button>
                <button onclick="loginPlayer(1)">Login</button>
                
                <div id="p1-status" class="status"></div>
                
                <hr style="margin: 20px 0; border-color: #0f0;">
                
                <div class="input-group">
                    <label>Difficulty:</label>
                    <select id="p1-difficulty">
                        <option value="easy">Easy</option>
                        <option value="medium">Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>
                
                <button onclick="joinQueue(1)" id="p1-join-btn" disabled>Join Queue</button>
                <button onclick="leaveQueue(1)" id="p1-leave-btn" disabled>Leave Queue</button>
                
                <div id="p1-match-info" class="match-info" style="display:none;"></div>
                
                <div class="input-group" style="margin-top: 20px;">
                    <label>Submit Code:</label>
                    <textarea id="p1-code" placeholder="// Your solution here"></textarea>
                    <select id="p1-language">
                        <option value="javascript">JavaScript</option>
                        <option value="python">Python</option>
                        <option value="cpp">C++</option>
                        <option value="java">Java</option>
                        <option value="c">C</option>
                    </select>
                </div>
                
                <button onclick="submitCode(1)" id="p1-submit-btn" disabled>Submit Code</button>
            </div>
            
            <!-- PLAYER 2 -->
            <div class="player-panel">
                <h2>👤 PLAYER 2</h2>
                
                <div class="input-group">
                    <label>Username:</label>
                    <input type="text" id="p2-username" value="player2">
                </div>
                
                <div class="input-group">
                    <label>Password:</label>
                    <input type="password" id="p2-password" value="12345678">
                </div>
                
                <button onclick="registerPlayer(2)">Register</button>
                <button onclick="loginPlayer(2)">Login</button>
                
                <div id="p2-status" class="status"></div>
                
                <hr style="margin: 20px 0; border-color: #0f0;">
                
                <div class="input-group">
                    <label>Difficulty:</label>
                    <select id="p2-difficulty">
                        <option value="easy">Easy</option>
                        <option value="medium">Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>
                
                <button onclick="joinQueue(2)" id="p2-join-btn" disabled>Join Queue</button>
                <button onclick="leaveQueue(2)" id="p2-leave-btn" disabled>Leave Queue</button>
                
                <div id="p2-match-info" class="match-info" style="display:none;"></div>
                
                <div class="input-group" style="margin-top: 20px;">
                    <label>Submit Code:</label>
                    <textarea id="p2-code" placeholder="// Your solution here"></textarea>
                    <select id="p2-language">
                        <option value="javascript">JavaScript</option>
                        <option value="python">Python</option>
                        <option value="cpp">C++</option>
                        <option value="java">Java</option>
                        <option value="c">C</option>
                    </select>
                </div>
                
                <button onclick="submitCode(2)" id="p2-submit-btn" disabled>Submit Code</button>
            </div>
        </div>
        
        <div class="logs">
            <h3>📋 EVENT LOGS</h3>
            <button onclick="clearLogs()" style="float: right;">Clear</button>
            <div id="logs"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000';
        
        const players = {
            1: { token: null, socket: null, matchId: null },
            2: { token: null, socket: null, matchId: null }
        };
        
        function log(message, type = 'info') {
            const logs = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logs.insertBefore(entry, logs.firstChild);
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
        }
        
        function updateStatus(player, message, isError = false) {
            const status = document.getElementById(`p${player}-status`);
            status.textContent = message;
            status.className = isError ? 'status error' : 'status success';
        }
        
        async function registerPlayer(player) {
            const username = document.getElementById(`p${player}-username`).value;
            const password = document.getElementById(`p${player}-password`).value;
            
            try {
                const response = await fetch(`${API_URL}/api/user/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username, 
                        email: `${username}@test.com`,
                        password 
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    updateStatus(player, `✅ Registered: ${username}`);
                    log(`Player ${player} registered: ${username}`, 'success');
                } else {
                    updateStatus(player, `❌ ${data.message}`, true);
                    log(`Player ${player} registration failed: ${data.message}`, 'error');
                }
            } catch (error) {
                updateStatus(player, `❌ Error: ${error.message}`, true);
                log(`Player ${player} registration error: ${error.message}`, 'error');
            }
        }
        
        async function loginPlayer(player) {
            const username = document.getElementById(`p${player}-username`).value;
            const password = document.getElementById(`p${player}-password`).value;
            
            try {
                const response = await fetch(`${API_URL}/api/user/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    players[player].token = data.data.accessToken;
                    updateStatus(player, `✅ Logged in: ${username} (Rating: ${data.data.user.rating})`);
                    log(`Player ${player} logged in: ${username}`, 'success');
                    
                    document.getElementById(`p${player}-join-btn`).disabled = false;
                    
                    connectWebSocket(player);
                } else {
                    updateStatus(player, `❌ ${data.message}`, true);
                    log(`Player ${player} login failed: ${data.message}`, 'error');
                }
            } catch (error) {
                updateStatus(player, `❌ Error: ${error.message}`, true);
                log(`Player ${player} login error: ${error.message}`, 'error');
            }
        }
        
        function connectWebSocket(player) {
            if (players[player].socket) {
                players[player].socket.disconnect();
            }
            
            const socket = io(API_URL, {
                auth: { token: players[player].token }
            });
            
            players[player].socket = socket;
            
            socket.on('connect', () => {
                log(`Player ${player} WebSocket connected`, 'success');
            });
            
            socket.on('disconnect', () => {
                log(`Player ${player} WebSocket disconnected`, 'warning');
            });
            
            socket.on('queue:joined', (data) => {
                log(`Player ${player} joined queue (position: ${data.position})`, 'info');
                document.getElementById(`p${player}-join-btn`).disabled = true;
                document.getElementById(`p${player}-leave-btn`).disabled = false;
            });
            
            socket.on('queue:left', () => {
                log(`Player ${player} left queue`, 'info');
                document.getElementById(`p${player}-join-btn`).disabled = false;
                document.getElementById(`p${player}-leave-btn`).disabled = true;
            });
            
            socket.on('match:found', (data) => {
                log(`Player ${player} MATCH FOUND! 🎮`, 'success');
                players[player].matchId = data.matchId;
                
                const matchInfo = document.getElementById(`p${player}-match-info`);
                matchInfo.style.display = 'block';
                matchInfo.innerHTML = `
                    <h4>🎯 Match Found!</h4>
                    <p><strong>Problem:</strong> ${data.problem.title}</p>
                    <p><strong>Difficulty:</strong> ${data.problem.difficulty}</p>
                    <p><strong>Opponent:</strong> ${data.opponent.username} (${data.opponent.rating})</p>
                    <p><strong>Your Role:</strong> ${data.yourRole}</p>
                    <hr style="margin: 10px 0; border-color: #0f0;">
                    <p><strong>Statement:</strong></p>
                    <pre style="white-space: pre-wrap;">${data.problem.statement}</pre>
                    <p><strong>Input Format:</strong> ${data.problem.inputFormat}</p>
                    <p><strong>Output Format:</strong> ${data.problem.outputFormat}</p>
                    <p><strong>Sample:</strong></p>
                    <pre>Input: ${data.problem.samples[0].input}\nOutput: ${data.problem.samples[0].output}</pre>
                `;
                
                document.getElementById(`p${player}-submit-btn`).disabled = false;
                document.getElementById(`p${player}-join-btn`).disabled = true;
                document.getElementById(`p${player}-leave-btn`).disabled = true;
            });
            
            socket.on('match:reading_phase_end', () => {
                log(`Player ${player} reading phase ended - START CODING! ⏰`, 'warning');
            });
            
            socket.on('submission:received', (data) => {
                log(`Player ${player} opponent submitted! Score: ${data.finalScore}`, 'info');
            });
            
            socket.on('match:finished', (data) => {
                log(`Player ${player} MATCH FINISHED! 🏆`, 'success');
                
                const isWinner = data.winner.userId === players[player].socket.id;
                const result = isWinner ? data.winner : data.loser;
                
                const matchInfo = document.getElementById(`p${player}-match-info`);
                matchInfo.innerHTML += `
                    <hr style="margin: 10px 0; border-color: #0f0;">
                    <h4>${isWinner ? '🏆 YOU WIN!' : '😢 YOU LOSE'}</h4>
                    <p><strong>Your Score:</strong> ${result.score}</p>
                    <p><strong>Execution Time:</strong> ${result.executionTime}ms</p>
                    <p><strong>Rating Change:</strong> ${result.ratingChange > 0 ? '+' : ''}${result.ratingChange}</p>
                    <p><strong>New Rating:</strong> ${result.newRating}</p>
                    <hr style="margin: 10px 0; border-color: #0f0;">
                    <h4>Winner's Code:</h4>
                    <pre style="white-space: pre-wrap;">${data.bestSubmission}</pre>
                `;
                
                document.getElementById(`p${player}-submit-btn`).disabled = true;
                document.getElementById(`p${player}-join-btn`).disabled = false;
            });
        }
        
        async function joinQueue(player) {
            const difficulty = document.getElementById(`p${player}-difficulty`).value;
            
            try {
                const response = await fetch(`${API_URL}/api/match/queue/join`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${players[player].token}`
                    },
                    body: JSON.stringify({ difficulty })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    updateStatus(player, `⏳ In queue (${difficulty})...`);
                } else {
                    updateStatus(player, `❌ ${data.message}`, true);
                    log(`Player ${player} queue join failed: ${data.message}`, 'error');
                }
            } catch (error) {
                updateStatus(player, `❌ Error: ${error.message}`, true);
                log(`Player ${player} queue error: ${error.message}`, 'error');
            }
        }
        
        async function leaveQueue(player) {
            try {
                const response = await fetch(`${API_URL}/api/match/queue/leave`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${players[player].token}`
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    updateStatus(player, `✅ Left queue`);
                } else {
                    updateStatus(player, `❌ ${data.message}`, true);
                }
            } catch (error) {
                updateStatus(player, `❌ Error: ${error.message}`, true);
            }
        }
        
        async function submitCode(player) {
            const code = document.getElementById(`p${player}-code`).value;
            const language = document.getElementById(`p${player}-language`).value;
            const matchId = players[player].matchId;
            
            if (!code.trim()) {
                alert('Enter code first!');
                return;
            }
            
            try {
                updateStatus(player, `⏳ Submitting code...`);
                
                const response = await fetch(`${API_URL}/api/submission/${matchId}`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${players[player].token}`
                    },
                    body: JSON.stringify({ code, language })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    updateStatus(player, `✅ Code submitted! Score: ${data.data.submission.finalScore}`);
                    log(`Player ${player} submitted code - ${data.data.submission.passedCount}/${data.data.submission.totalCount} tests passed`, 'success');
                    document.getElementById(`p${player}-submit-btn`).disabled = true;
                } else {
                    updateStatus(player, `❌ ${data.message}`, true);
                    log(`Player ${player} submission failed: ${data.message}`, 'error');
                }
            } catch (error) {
                updateStatus(player, `❌ Error: ${error.message}`, true);
                log(`Player ${player} submission error: ${error.message}`, 'error');
            }
        }
    </script>
</body>
</html>
